name: Windows telepito keszitese

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Forras letoltese
        uses: actions/checkout@v4

      - name: Node.js beallitasa
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fuggosegek telepitese
        run: npm install --no-audit --no-fund

      - name: Telepito buildelese
        run: npx electron-builder --win --publish never

      - name: Telepito feltoltese (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Legend-of-the-Six-Elements-Setup
          path: dist/*.exe

      - name: Csatolas a kiadasokhoz (csak v* tag eseten)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.exe
